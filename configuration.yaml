#
# This is a pretty basic HA config, for now at least. :)
#

default_config:

homeassistant:
  name: April's Nest
  country: US
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  elevation: !secret home_elevation
  unit_system: imperial
  time_zone: America/Los_Angeles
  internal_url: !secret home_internal_url
  legacy_templates: false
  customize: !include customizations.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies: 10.3.2.5

# Text to speech
tts:
  - platform: cloud

group: !include groups.yaml
automation manual: !include_dir_merge_list automation/
automation ui: !include automations.yaml
script: !include scripts.yaml
scene: !include_dir_list scenes/

homekit: !include homekit.yaml

zone: !include zones.yaml


# Templated covers
cover: !include covers.yaml

# Enable streaming cameras
ffmpeg:
  ffmpeg_bin: /usr/bin/ffmpeg
stream:
  ll_hls: true
  part_duration: 0.75 # Range of 0.2 to 1.5
  segment_duration: 6 # Range of 2 to 10

# MQTT Config
mqtt: !include mqtt.yaml

# Manually-defined sensors
binary_sensor: !include binary_sensors.yaml
sensor: !include_dir_merge_list sensor/
input_number: !include input_number.yaml
utility_meter: !include utility_meter.yaml

climate: !include_dir_merge_list climate/

# Modern template sensors
template:
  - sensor:
      - name: "Electricity Cost Rate"
        unit_of_measurement: "USD/h"
        state: >-
          {% set power_w = states('sensor.aprils_nest_energy_monitor_electric_consumption_w') | float(0) %}
          {% set rate = states('sensor.electricity_rate') | float(0) %}
          {{ (power_w / 1000 * rate) | round(4) }}
      - name: "Sable Hotend Target"
        device_class: temperature
        unit_of_measurement: "°C"
        state: >-
          {{ states.sensor.sable_sensor.attributes['extruder']['target'] | float | round(1) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Hotend Actual"
        device_class: temperature
        unit_of_measurement: "°C"
        state: >-
          {{ states.sensor.sable_sensor.attributes['extruder']['temperature'] | float | round(1) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Bed Target"
        device_class: temperature
        unit_of_measurement: "°C"
        state: >-
          {{ states.sensor.sable_sensor.attributes['heater_bed']['target'] | float | round(1) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Bed Actual"
        device_class: temperature
        unit_of_measurement: "°C"
        state: >-
          {{ states.sensor.sable_sensor.attributes['heater_bed']['temperature'] | float | round(1) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable State"
        icon: mdi:printer-3d
        state: >-
          {{ states.sensor.sable_sensor.attributes['print_stats']['state'] if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Current Print"
        state: >-
          {{ states.sensor.sable_sensor.attributes['print_stats']['filename'] if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Current Progress"
        unit_of_measurement: "%"
        icon: mdi:file-percent
        state: >-
          {{ (states.sensor.sable_sensor.attributes['display_status']['progress'] * 100) | round(1) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Print Time"
        icon: mdi:clock-start
        state: >-
          {{ states.sensor.sable_sensor.attributes['print_stats']['print_duration'] | timestamp_custom("%H:%M:%S", 0) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Time Remaining"
        icon: mdi:clock-end
        state: >-
          {{ (((states.sensor.sable_sensor.attributes['print_stats']['print_duration'] / states.sensor.sable_sensor.attributes['display_status']['progress'] - states.sensor.sable_sensor.attributes['print_stats']['print_duration']) if states.sensor.sable_sensor.attributes['display_status']['progress'] > 0 else 0) | timestamp_custom('%H:%M:%S', 0)) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable ETA"
        icon: mdi:clock-outline
        state: >-
          {{ (as_timestamp(now()) + 2 * 60 * 60 + ((states.sensor.sable_sensor.attributes['print_stats']['print_duration'] / states.sensor.sable_sensor.attributes['display_status']['progress'] - states.sensor.sable_sensor.attributes['print_stats']['print_duration']) if states.sensor.sable_sensor.attributes['display_status']['progress'] > 0 else 0)) | timestamp_custom("%H:%M:%S", 0) if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Nozzletemp"
        icon: mdi:thermometer
        state: >-
          {{ [(states.sensor.sable_sensor.attributes['extruder']['temperature'] | float | round(1) | string), " / ", (states.sensor.sable_sensor.attributes['extruder']['target'] | float | round(1) | string)] | join if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Sable Bedtemp"
        icon: mdi:thermometer
        state: >-
          {{ [(states.sensor.sable_sensor.attributes['heater_bed']['temperature'] | float | round(1) | string), " / ", (states.sensor.sable_sensor.attributes['heater_bed']['target'] | float | round(1) | string)] | join if is_state('sensor.sable_sensor', 'OK') else None }}
      - name: "Rain Today"
        unit_of_measurement: "in"
        device_class: precipitation
        state: >-
          {%- if not (is_state("sensor.rain_amount","unknown") or is_state("sensor.rain_in_prior","unknown") )-%}
          {{ ((states('sensor.rain_amount') | float) - (states('sensor.rain_in_prior') | float)) | round(2) }}
          {%- endif -%}
      - name: "Wind Direction"
        state: >-
          {% set direction = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW','N'] %}
          {% set degree = states('sensor.wind_bearing')|float %}
          {{ direction[((degree+11.25)/22.5)|int] }}
      - name: "Electricity Rate"
        unit_of_measurement: "USD/kWh"
        device_class: monetary
        state: >-
          {% set m = now().hour * 60 + now().minute %}
          {% set is_weekday = now().isoweekday() in [1, 2, 3, 4, 5] %}
          {% if is_weekday %}
            {% if (420 <= m < 600) or (1020 <= m < 1200) %}
              0.495597
            {% elif (600 <= m < 1020) or (1200 <= m < 1380) %}
              0.140272
            {% else %}
              0.091624
            {% endif %}
          {% else %}
            {% if 420 <= m < 1380 %}
              0.140272
            {% else %}
              0.091624
            {% endif %}
          {% endif %}
      - name: "Electricity Rate Period"
        state: >-
          {% set m = now().hour * 60 + now().minute %}
          {% set is_weekday = now().isoweekday() in [1, 2, 3, 4, 5] %}
          {% if is_weekday %}
            {% if (420 <= m < 600) or (1020 <= m < 1200) %}
              On Peak
            {% elif (600 <= m < 1020) or (1200 <= m < 1380) %}
              Off Peak
            {% else %}
              Super Off-Peak
            {% endif %}
          {% else %}
            {% if 420 <= m < 1380 %}
              Off Peak
            {% else %}
              Super Off-Peak
            {% endif %}
          {% endif %}
    light:
      - name: "Family Room Clock"
        state: "{{ states('input_boolean.creatures_clocky_family_room_display_on') }}"
        turn_on:
          - action: input_boolean.turn_on
            data:
              entity_id:
                - input_boolean.creatures_clocky_family_room_display_on
        turn_off:
          - action: input_boolean.turn_off
            data:
              entity_id:
                - input_boolean.creatures_clocky_family_room_display_on
      - name: "Family Room Lights"
        state: "{{ states('group.family_room_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.family_room_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.family_room_lights
      - name: "Workshop Lights"
        state: "{{ states('group.workshop_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.workshop_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.workshop_lights
      - name: "Guest Room Lights"
        state: "{{ states('group.guest_room_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.guest_room_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.guest_room_lights
      - name: "Hallway Lights"
        state: "{{ states('group.hallway_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.hallway_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.hallway_lights
      - name: "Hallway Bathroom Lights"
        state: "{{ states('group.hallway_bathroom_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.hallway_bathroom_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.hallway_bathroom_lights
      - name: "Half Bathroom Lights"
        state: "{{ states('group.half_bathroom_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.half_bathroom_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.half_bathroom_lights
      - name: "Laundry Room Lights"
        state: "{{ states('group.laundry_room_lights') }}"
        turn_on:
          - action: homeassistant.turn_on
            data:
              entity_id:
                - group.laundry_room_lights
        turn_off:
          - action: homeassistant.turn_off
            data:
              entity_id:
                - group.laundry_room_lights

# Enable iOS stuff
#ios: !include ios.yaml

# Turn on themes
frontend:
  themes: !include_dir_merge_named themes

# Telegram bot config
telegram_bot: !include telegram.yaml

# Use PostgreSQL for our recorder DB
recorder:
  db_url: !secret pgsql_connection_uri
  db_retry_wait: 15 # Wait 15 seconds before retrying
  exclude:
    domains:
      - automation
      - updater
    entity_globs:
      - sensor.weather_*
    entities:
      - sun.sun # Don't record sun data
      - sensor.last_boot # Comes from 'systemmonitor' sensor platform
      - sensor.date
    event_types:
      - call_service # Don't record service calls

# Notification group for alerts
notify:
  - platform: telegram
    name: bunny_telegram
    chat_id: !secret bunny_telegram_id
  - platform: telegram
    name: aprils_nest_telegram_group
    chat_id: !secret aprils_nest_telegram_group_id
  - platform: telegram
    name: lil_bun_watch_telegram_group
    chat_id: !secret lil_bun_watch_group_id
  - name: aprils_devices
    platform: group
    services:
      - service: mobile_app_april_s_phone
      - service: aprils_nest_telegram_group

# Toss our metrics to influxdb so we can keep lots of history
influxdb:
  api_version: 2
  ssl: false
  host: 10.3.2.5
  port: 8086
  token: !secret influxdb_token
  organization: !secret influxdb_organization
  bucket: "Home Assistant"
  tags:
    source: HA
  tags_attributes:
    - friendly_name
  default_measurement: units
